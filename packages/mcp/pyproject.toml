[project]
name = "kernia-mcp"
version = "0.0.0"
description = "OAuth-protected Model Context Protocol (MCP) integration for kernia, built on FastMCP"
requires-python = ">=3.11"
dependencies = [
    "kernia",
    "fastmcp>=2.3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kernia_mcp"]
