[project]
name = "better-auth-mcp"
version = "0.0.0"
description = "OAuth-protected Model Context Protocol (MCP) integration for better-auth, built on FastMCP"
requires-python = ">=3.11"
dependencies = [
    "better-auth",
    "fastmcp>=2.3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kernia_mcp"]
