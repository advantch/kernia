[project]
name = "kernia-starlette"
version = "0.0.0"
description = "Starlette integration"
requires-python = ">=3.11"
dependencies = [
    "kernia",
    "starlette>=0.37",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kernia_starlette"]
