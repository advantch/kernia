[project]
name = "kernia-memory-adapter"
version = "0.0.0"
description = "In-memory adapter for Kernia (tests + dev)"
requires-python = ">=3.11"
dependencies = ["kernia"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kernia_memory_adapter"]
