[project]
name = "better-auth-memory-adapter"
version = "0.0.0"
description = "In-memory adapter for better-auth (tests + dev)"
requires-python = ">=3.11"
dependencies = ["better-auth"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/better_auth_memory_adapter"]
