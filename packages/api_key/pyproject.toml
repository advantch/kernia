[project]
name = "better-auth-api-key"
version = "0.0.0"
description = "API key plugin for better-auth"
requires-python = ">=3.11"
dependencies = [
    "better-auth",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/better_auth_api_key"]
