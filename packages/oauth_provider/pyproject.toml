[project]
name = "kernia-oauth-provider"
version = "0.0.0"
description = "OAuth2/OIDC provider (issuer side) plugin"
requires-python = ">=3.11"
dependencies = [
    "kernia",
    "authlib>=1.3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kernia_oauth_provider"]
