[project]
name = "better-auth-oauth-provider"
version = "0.0.0"
description = "OAuth2/OIDC provider (issuer side) plugin"
requires-python = ">=3.11"
dependencies = [
    "better-auth",
    "authlib>=1.3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/better_auth_oauth_provider"]
