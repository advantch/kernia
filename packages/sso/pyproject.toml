[project]
name = "better-auth-sso"
version = "0.0.0"
description = "SAML + OIDC SSO plugin for better-auth"
requires-python = ">=3.11"
dependencies = [
    "better-auth",
    "authlib>=1.3",
    "python3-saml>=1.16",
    "httpx>=0.27",
    "anyio>=4.0",
    "pydantic>=2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/better_auth_sso"]
