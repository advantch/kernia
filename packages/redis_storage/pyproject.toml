[project]
name = "kernia-redis-storage"
version = "0.0.0"
description = "Redis-backed secondary storage for Kernia"
requires-python = ">=3.11"
dependencies = [
    "kernia",
    "redis>=5",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kernia_redis_storage"]
