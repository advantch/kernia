[project]
name = "better-auth-redis-storage"
version = "0.0.0"
description = "Redis-backed secondary storage for better-auth"
requires-python = ">=3.11"
dependencies = [
    "better-auth",
    "redis>=5",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/better_auth_redis_storage"]
