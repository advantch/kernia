[project]
name = "kernia-passkey"
version = "0.0.0"
description = "WebAuthn/FIDO2 passkey plugin for Kernia"
requires-python = ">=3.11"
dependencies = [
    "kernia",
    "webauthn>=2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kernia_passkey"]
