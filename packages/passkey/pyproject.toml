[project]
name = "better-auth-passkey"
version = "0.0.0"
description = "WebAuthn/FIDO2 passkey plugin for better-auth"
requires-python = ">=3.11"
dependencies = [
    "better-auth",
    "webauthn>=2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/better_auth_passkey"]
