[project]
name = "better-auth-scim"
version = "0.0.0"
description = "SCIM 2.0 provisioning plugin"
requires-python = ">=3.11"
dependencies = [
    "better-auth",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/better_auth_scim"]
