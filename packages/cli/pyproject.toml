[project]
name = "kernia-cli"
version = "0.0.0"
description = "CLI for Kernia (codegen, migrations)"
requires-python = ">=3.11"
dependencies = [
    "kernia",
    "click>=8.1",
    "sqlalchemy>=2.0",
    "alembic>=1.13",
]

[project.scripts]
kernia = "kernia_cli.__main__:cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kernia_cli"]
