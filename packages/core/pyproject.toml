[project]
name = "kernia"
version = "0.0.0"
description = "Python implementation compatible with Better Auth — framework-agnostic core"
requires-python = ">=3.11"
dependencies = [
    "argon2-cffi>=23",
    "cryptography>=42",
    "httpx>=0.27",
    "pydantic>=2",
]

[project.optional-dependencies]
jwt = ["authlib>=1.3"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kernia"]
