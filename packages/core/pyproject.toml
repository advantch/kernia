[project]
name = "better-auth"
version = "0.0.0"
description = "Python port of better-auth — framework-agnostic core"
requires-python = ">=3.11"
dependencies = []

[project.optional-dependencies]
jwt = ["authlib>=1.3"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/better_auth"]
