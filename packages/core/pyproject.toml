[project]
name = "kernia"
version = "0.1.0"
description = "Framework-agnostic authentication for Python: sessions, OAuth, passkeys, and a plugin system"
requires-python = ">=3.11"
dependencies = [
    "argon2-cffi>=23",
    "cryptography>=42",
    "httpx>=0.27",
    "pydantic>=2",
]
readme = "README.md"
license = "MIT"
license-files = [
    "LICENSE",
]
authors = [
    {name = "Advantch"},
]
keywords = [
    "authentication",
    "authorization",
    "sessions",
    "oauth",
    "passkeys",
    "sso",
    "asgi",
    "fastapi",
    "starlette",
    "django",
    "security",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Internet :: WWW/HTTP :: Session",
    "Topic :: Security",
    "Typing :: Typed",
]

[project.optional-dependencies]
jwt = ["authlib>=1.3"]
passkey = ["webauthn>=2"]
sso = ["authlib>=1.3", "python3-saml>=1.16", "anyio>=4.0"]
oauth-provider = ["authlib>=1.3"]
stripe = ["stripe>=10"]
mcp = ["fastmcp>=2.3"]
sqlalchemy = ["sqlalchemy>=2.0", "aiosqlite>=0.20", "greenlet>=3.0"]
mongo = ["motor>=3"]
redis = ["redis>=5"]
fastapi = ["fastapi>=0.110"]
starlette = ["starlette>=0.37"]
django = ["django>=4.2", "anyio>=4"]
all = [
    "authlib>=1.3",
    "webauthn>=2",
    "python3-saml>=1.16",
    "anyio>=4.0",
    "stripe>=10",
    "fastmcp>=2.3",
    "sqlalchemy>=2.0",
    "aiosqlite>=0.20",
    "greenlet>=3.0",
    "motor>=3",
    "redis>=5",
    "fastapi>=0.110",
    "starlette>=0.37",
    "django>=4.2",
]

[project.urls]
Homepage = "https://kernia.dev"
Documentation = "https://kernia.dev/docs"
Source = "https://github.com/advantch/kernia"
Issues = "https://github.com/advantch/kernia/issues"
Changelog = "https://github.com/advantch/kernia/releases"
[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = [
    "src/kernia",
    "src/kernia_api_key",
    "src/kernia_passkey",
    "src/kernia_sso",
    "src/kernia_oauth_provider",
    "src/kernia_scim",
    "src/kernia_stripe",
    "src/kernia_mcp",
    "src/kernia_memory_adapter",
    "src/kernia_sqlalchemy",
    "src/kernia_mongo",
    "src/kernia_redis_storage",
    "src/kernia_fastapi",
    "src/kernia_starlette",
    "src/kernia_django",
]
