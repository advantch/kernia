[project]
name = "better-auth-test-utils"
version = "0.0.0"
description = "Shared test utilities for better-auth"
requires-python = ">=3.11"
dependencies = ["better-auth"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/better_auth_test_utils"]
