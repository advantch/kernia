[project]
name = "better-auth-test-utils"
version = "0.0.0"
description = "Shared test utilities for better-auth"
requires-python = ">=3.11"
dependencies = [
    "better-auth",
    "cryptography>=42",
    "httpx>=0.27",
    "cbor2>=5",
    "webauthn>=2.7",
    "lxml>=5",
]

[project.optional-dependencies]
testcontainers = ["testcontainers>=4"]
pytest = ["pytest>=8"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/better_auth_test_utils"]
