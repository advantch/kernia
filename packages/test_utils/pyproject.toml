[project]
name = "kernia-test-utils"
version = "0.1.0"
description = "Shared test utilities for Kernia"
requires-python = ">=3.11"
dependencies = [
    "kernia>=0.1.0",
    "cryptography>=42",
    "httpx>=0.27",
    "cbor2>=5",
    "webauthn>=2.7",
    "lxml>=5",
]
readme = "README.md"
license = "MIT"
license-files = [
    "LICENSE",
]
authors = [
    {name = "Advantch"},
]
keywords = [
    "authentication",
    "authorization",
    "sessions",
    "oauth",
    "passkeys",
    "sso",
    "asgi",
    "fastapi",
    "starlette",
    "django",
    "security",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Internet :: WWW/HTTP :: Session",
    "Topic :: Security",
    "Typing :: Typed",
]

[project.optional-dependencies]
testcontainers = ["testcontainers>=4"]
pytest = ["pytest>=8"]

[project.urls]
Homepage = "https://kernia.dev"
Documentation = "https://kernia.dev/docs"
Source = "https://github.com/advantch/kernia"
Issues = "https://github.com/advantch/kernia/issues"
Changelog = "https://github.com/advantch/kernia/releases"
[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kernia_test_utils"]
