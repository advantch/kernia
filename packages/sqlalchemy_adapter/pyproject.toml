[project]
name = "better-auth-sqlalchemy"
version = "0.0.0"
description = "SQLAlchemy 2.x async adapter for better-auth"
requires-python = ">=3.11"
dependencies = [
    "better-auth",
    "sqlalchemy>=2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/better_auth_sqlalchemy"]
