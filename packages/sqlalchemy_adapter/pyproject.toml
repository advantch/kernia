[project]
name = "kernia-sqlalchemy"
version = "0.0.0"
description = "SQLAlchemy 2.x async adapter for Kernia"
requires-python = ">=3.11"
dependencies = [
    "kernia",
    "sqlalchemy>=2.0",
    "aiosqlite>=0.20",
    "greenlet>=3.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kernia_sqlalchemy"]
