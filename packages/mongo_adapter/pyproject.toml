[project]
name = "kernia-mongo"
version = "0.0.0"
description = "MongoDB adapter for Kernia (motor)"
requires-python = ">=3.11"
dependencies = [
    "kernia",
    "motor>=3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kernia_mongo"]
