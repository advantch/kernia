[project]
name = "better-auth-mongo"
version = "0.0.0"
description = "MongoDB adapter for better-auth (motor)"
requires-python = ">=3.11"
dependencies = [
    "better-auth",
    "motor>=3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/better_auth_mongo"]
