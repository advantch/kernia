[project]
name = "better-auth-django"
version = "0.0.0"
description = "Django integration"
requires-python = ">=3.11"
dependencies = [
    "better-auth",
    "django>=4.2",
    "anyio>=4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/better_auth_django"]
