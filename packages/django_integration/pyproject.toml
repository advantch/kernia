[project]
name = "kernia-django"
version = "0.0.0"
description = "Django integration"
requires-python = ">=3.11"
dependencies = [
    "kernia",
    "django>=4.2",
    "anyio>=4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kernia_django"]
