[project]
name = "better-auth-fastapi"
version = "0.0.0"
description = "FastAPI integration for better-auth"
requires-python = ">=3.11"
dependencies = [
    "better-auth",
    "fastapi>=0.110",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/better_auth_fastapi"]
