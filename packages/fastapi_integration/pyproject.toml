[project]
name = "kernia-fastapi"
version = "0.0.0"
description = "FastAPI integration for Kernia"
requires-python = ">=3.11"
dependencies = [
    "kernia",
    "fastapi>=0.110",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kernia_fastapi"]
