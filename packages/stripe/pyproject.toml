[project]
name = "kernia-stripe"
version = "0.0.0"
description = "Stripe billing + webhooks plugin"
requires-python = ">=3.11"
dependencies = [
    "kernia",
    "httpx>=0.27",
    "pydantic>=2",
    "stripe>=10",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kernia_stripe"]
