[project]
name = "better-auth-stripe"
version = "0.0.0"
description = "Stripe billing + webhooks plugin"
requires-python = ">=3.11"
dependencies = [
    "better-auth",
    "stripe>=10",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/better_auth_stripe"]
