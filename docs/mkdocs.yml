site_name: kernia
site_description: A Python implementation compatible with Better Auth — authentication for ASGI apps.
site_url: https://kernia.dev
repo_url: https://github.com/advantch/kernia
docs_dir: .
site_dir: ../site

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - FastAPI SaaS demo: demo.md
  - Admin config: admin-config.md
  - Email clients: email-clients.md
  - Billing and entitlements: billing.md
  - Deployment: deployment.md
  - Testing: testing.md
  - Plugins:
      - Overview: plugins/index.md
      - Stripe: plugins/stripe.md
      - API keys: plugins/api_key.md
      - Passkeys: plugins/passkey.md
      - SSO: plugins/sso.md
      - SCIM: plugins/scim.md
      - OAuth provider: plugins/oauth_provider.md
      - Redis storage: plugins/redis_storage.md
      - Adapters: plugins/adapters.md
  - OpenAPI: openapi.md
