name: Release

# Publishes the three Kernia distributions (kernia, kernia-cli,
# kernia-test-utils) to PyPI when a version tag (v*) is pushed. Auth is PyPI
# Trusted Publishing (OIDC) — no API tokens anywhere. The suite is versioned in
# lockstep: the tag (e.g. v0.1.0) must match packages/core. Cut a release with:
#
#   uv run --with tomlkit python scripts/bump_version.py 0.2.0
#   git commit -am "release: v0.2.0" && git tag v0.2.0 && git push --follow-tags
#
# See RELEASING.md.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build + validate only, skip the PyPI upload"
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  build:
    name: Build + validate all packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - run: uv python install 3.12

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(grep -m1 '^version = ' packages/core/pyproject.toml | sed 's/version = //; s/"//g')"
          echo "tag=$tag package=$pkg"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::tag v$tag does not match packages/core version $pkg" >&2
            exit 1
          fi

      - name: Build every workspace package (uv build)
        run: |
          set -euo pipefail
          for pkg in kernia kernia-cli kernia-test-utils
          do
            echo "::group::build $pkg"
            uv build --package "$pkg" --out-dir dist/
            echo "::endgroup::"
          done
          ls -la dist/

      # uv has no README-render linter yet; this is the one non-uv step, kept so
      # a malformed long_description fails here instead of mid-upload.
      - name: Validate metadata rendering
        run: uvx twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: python-packages
          path: dist/
          retention-days: 14

  # One publish job per package: PyPI keys trusted publishers on the tuple
  # (owner, repo, workflow, environment), so each package gets its own GitHub
  # environment to make its tuple unique. Wheel/sdist filenames normalize "-"
  # to "_", so the per-package glob is collision-free (dist/kernia-* matches
  # only the core package; kernia-cli builds as kernia_cli-*).
  publish:
    name: Publish ${{ matrix.pkg }}
    needs: build
    if: ${{ startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.dry_run == false) }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Serial: PyPI rate-limits new-project creation (429 on parallel bursts),
      # and releases are not latency-critical.
      max-parallel: 1
      matrix:
        include:
          - { pkg: kernia, env: pypi }
          - { pkg: kernia-cli, env: pypi-cli }
          - { pkg: kernia-test-utils, env: pypi-test-utils }
    environment:
      name: ${{ matrix.env }}
      url: https://pypi.org/project/${{ matrix.pkg }}/
    permissions:
      id-token: write  # OIDC for PyPI trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-packages
          path: dist/

      - uses: astral-sh/setup-uv@v6

      # Auth is PyPI Trusted Publishing (OIDC) only — no API tokens. Each package
      # has a per-project trusted publisher keyed on (owner, repo, workflow,
      # environment). --check-url makes reruns skip files that already made it up.
      - name: Publish ${{ matrix.pkg }} (uv publish)
        run: |
          mod="$(echo "${{ matrix.pkg }}" | tr '-' '_')"
          ls dist/ | grep -i "^${mod}-" || { echo "::error::no artifacts for ${{ matrix.pkg }}"; exit 1; }
          uv publish --trusted-publishing always --check-url "https://pypi.org/simple/" dist/${mod}-*
